name: events_sync_result
description: >
  Events processed during each sync run, labeled by source scraper, target
  calendar, and action (inserted / updated / skipped / errors). Each log entry
  carries the count for that source+calendar+action combination.
filter: 'jsonPayload.event_type="sync_result"'
metricDescriptor:
  metricKind: GAUGE
  valueType: INT64
  unit: "1"
  labels:
    - key: source
      valueType: STRING
      description: Scraper module name (e.g. luma_tiat, partiful)
    - key: calendar
      valueType: STRING
      description: Target Google Calendar name (e.g. SF Tech, SF Arts/Culture)
    - key: action
      valueType: STRING
      description: "Action taken: inserted, updated, skipped, or errors"
labelExtractors:
  source: EXTRACT(jsonPayload.source)
  calendar: EXTRACT(jsonPayload.calendar)
  action: EXTRACT(jsonPayload.action)
valueExtractor: EXTRACT(jsonPayload.count)
